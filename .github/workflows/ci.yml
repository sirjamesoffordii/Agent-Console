name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Extension integration tests
        run: node tests/extension.integration.test.mjs
      - name: PS contract tests
        shell: pwsh
        run: pwsh -NoProfile -File tests/agent-contract.tests.ps1
      - name: Package VSIX
        run: npm run package
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-console-vsix
          path: dist/agent-console.vsix
          if-no-files-found: error
